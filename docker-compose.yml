services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    # Pull the published image instead of building by setting IMAGE, e.g.
    #   IMAGE=ghcr.io/<owner>/cebric-beta-platform:latest docker compose up
    image: ${IMAGE:-cebric-beta-platform:local}
    container_name: cebric-beta-platform
    ports:
      - "${PORT:-8080}:3000"
    environment:
      # Needed for the Gemini AI features (read from your shell / .env)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      # Mount the JSON database from the project root into the container.
      # Edits on either side are shared; data survives container rebuilds.
      - ./DatabaseUser.json:/app/DatabaseUser.json
    restart: unless-stopped
