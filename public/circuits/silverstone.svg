<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%" id="silverstone-svg-visual">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="0.5"/>
    </pattern>
    <!-- Glow filters for sectors -->
    <filter id="glow-s1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-s2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-s3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Cockpit Dashboard Canvas Background -->
  <rect width="1000" height="650" fill="#0b0b0c" />
  <rect width="1000" height="650" fill="url(#grid)" opacity="0.4" />

  <!-- DRS Area highlight dashes -->
  <!-- Wellington Straight DRS Dash line -->
  <path d="M 470 410 L 160 300" stroke="#10b981" stroke-width="3" stroke-dasharray="6 4" opacity="0.6" />
  <!-- Hangar Straight DRS Dash line -->
  <path d="M 640 400 L 750 310" stroke="#10b981" stroke-width="3" stroke-dasharray="6 4" opacity="0.6" />

  <!-- Track trace lines with authentic sectors from image -->
  <!-- Sector 1: Red (Turns 1 to 5) -->
  <path id="sector-1" d="M 370 170 Q 380 230 430 260 L 460 280 Q 500 300 450 320 T 400 370 T 450 410" 
        fill="none" stroke="#ef4444" stroke-width="12" stroke-linecap="round" filter="url(#glow-s1)" />
  
  <!-- Sector 2: Blue (Turns 6 to 11) -->
  <path id="sector-2" d="M 450 410 L 160 300 Q 120 280 140 240 T 210 180 Q 255 120 300 150 Q 320 180 370 140 T 435 150 Q 520 140 640 400" 
        fill="none" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" filter="url(#glow-s2)" />

  <!-- Sector 3: Yellow (Turns 12 to 18) -->
  <path id="sector-3" d="M 640 400 T 750 310 Q 790 270 790 200 T 730 110 T 670 130 T 610 200 T 510 120 L 370 170" 
        fill="none" stroke="#eab308" stroke-width="12" stroke-linecap="round" filter="url(#glow-s3)" />

  <!-- DRS Zone Indicators from Picture -->
  <!-- DRS Detection Zone 1 (Green box) -->
  <g transform="translate(480, 200)">
    <rect width="180" height="60" rx="8" fill="#10b981" />
    <text x="90" y="25" fill="#ffffff" font-family="monospace" font-weight="900" font-size="12" text-anchor="middle">DRS DETECTION</text>
    <text x="90" y="45" fill="#ffffff" font-family="monospace" font-weight="900" font-size="16" text-anchor="middle">ZONE 01</text>
    <!-- Connector line -->
    <path d="M 90 60 L 90 90" stroke="#10b981" stroke-width="2" />
    <circle cx="90" cy="90" r="5" fill="#10b981" />
  </g>

  <!-- DRS Detection Zone 2 (Green box) -->
  <g transform="translate(600, 480)">
    <rect width="180" height="60" rx="8" fill="#10b981" />
    <text x="90" y="25" fill="#ffffff" font-family="monospace" font-weight="900" font-size="12" text-anchor="middle">DRS DETECTION</text>
    <text x="90" y="45" fill="#ffffff" font-family="monospace" font-weight="900" font-size="16" text-anchor="middle">ZONE 02</text>
    <!-- Connector line -->
    <path d="M 90 0 L 90 -40" stroke="#10b981" stroke-width="2" />
    <circle cx="90" cy="-40" r="5" fill="#10b981" />
  </g>

  <!-- Speed Trap (Magenta box) -->
  <g transform="translate(180, 390)">
    <rect width="120" height="40" rx="6" fill="#ec4899" />
    <text x="60" y="25" fill="#ffffff" font-family="monospace" font-weight="950" font-size="14" text-anchor="middle">SPEED TRAP</text>
    <path d="M 60 0 L 60 -50" stroke="#ec4899" stroke-width="2" />
    <circle cx="60" cy="-50" r="5" fill="#ec4899" />
  </g>

  <!-- Start Finish Flags -->
  <!-- Checker grid -->
  <g transform="translate(410, 150) rotate(-15)">
    <rect width="20" height="12" fill="#ffffff" />
    <rect x="0" y="0" width="5" height="6" fill="#000000" />
    <rect x="10" y="0" width="5" height="6" fill="#000000" />
    <rect x="5" y="6" width="5" height="6" fill="#000000" />
    <rect x="15" y="6" width="5" height="6" fill="#000000" />
  </g>

  <!-- Interactive hover nodes with turns -->
  <!-- We'll define coordinate points for turns and make them hoverable circles in the React overlay dynamically -->
</svg>
